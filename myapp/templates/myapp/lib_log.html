<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Librarian Login - Library Management System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" type="text/css" href="{% static 'myapp/css/index.css' %}">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center vh-100">

    <div class="login-container p-4 rounded shadow">
        <h4 class="mb-4 text-center">📚 Library Management System</h4>
        <h5 class="text-warning text-center mb-3">Librarian Login</h5>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username:</label>
                <input type="text" class="form-control code-style" id="username" name="username" placeholder="Enter librarian ID">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password:</label>
                <input type="password" class="form-control code-style" id="password" name="password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-warning w-100 mt-3">Login</button>
            <br>
            <br>

            <div class="alert alert-{{ message.tags }} py-1 small text-center" role="alert">
                {{ message }}
            </div>

        </form>

    </div>

</body>
</html>
